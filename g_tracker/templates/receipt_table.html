{% extends "layout.html" %}

{% block title %}

{% endblock %}

{% block main %}
  <div>
    <h1>Receipts</h1>
    <hr>
    <div id="table"></div>
  </div>
  <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>
  <script>
    new gridjs.Grid({
      columns: [
        { id: 'person', name: 'Person' },
        { id: 'shop', name: 'Shop' },
        { id: 'total', name: 'Total', sort: {
            compare: (a, b) => {
              if (parseFloat(a) > parseFloat(b)) {
                  return 1;
              } else if (parseFloat(b) > parseFloat(a)) {
                  return -1;
              } else {
                  return 0;
              }
            },
          },
        },
        { id: 'date', name: 'Shopping date', sort: {
            compare: (a, b) => {
              const d1 = Date.parse(a);
              const d2 = Date.parse(b);

              if (d1 > d2) {
                  return 1;
              } else if (d2 > d1) {
                  return -1;
              } else {
                  return 0;
              }
            },
          },
        },
        { id: 'items', name: 'Show' },
        { id: 'del', name: 'Delete' }
      ],
      data: [
        {% for receipt, buyer in receipts_persons %}
          {
            person: '{{ buyer.name }}',
            shop: '{{ receipt.shop_name }}',
            total: '{{ receipt.total }}',
            date: '{{ receipt.shopping_date.strftime('%Y/%m/%d') }}',
            items: gridjs.html(`<a href={{ url_for('item_table.items', receipt_id=receipt.receipt_id) }}><img class="svg-icon" src="/static/receipt.svg"/></a>`),
            del: gridjs.html(`<form method="post" action="{{ url_for('item_table.delete_receipt') }}" style="display:inline" onsubmit="return confirm('Delete this receipt and its items?');"><input type="hidden" name="receipt_id" value="{{ receipt.receipt_id }}" /><button type="submit" class="btn btn-sm btn-outline-danger">Delete</button></form>`)
          },
        {% endfor %}
      ],
      search: {
        selector: (cell, rowIndex, cellIndex) => [0, 1, 4].includes(cellIndex) ? cell : null,
      },
      sort: true,
      pagination: true,
    }).render(document.getElementById('table'));
  </script>
{% endblock %}
